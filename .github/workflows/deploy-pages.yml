name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_SENTRY_ENV: production
      VITE_LOGROCKET_ID: ${{ secrets.VITE_LOGROCKET_ID }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_ENABLE_MSW: 'false'
      VITE_FEATURE_NEW_UI: ${{ vars.VITE_FEATURE_NEW_UI || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve release metadata
        run: |
          echo "VITE_SENTRY_RELEASE=${GITHUB_SHA}" >> "$GITHUB_ENV"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VITE_APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VITE_APP_VERSION=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate env contract
        run: npm run check:env

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Accessibility tests
        run: npm run test:a11y

      - name: Build
        run: npm run build:gh

      - name: Check bundle budget
        run: npm run check:bundle

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Store build artifact (rollback)
        uses: actions/upload-artifact@v4
        with:
          name: draft-dist-${{ github.sha }}
          path: dist
          retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  upload-maps:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_SENTRY_ENV: production
      VITE_LOGROCKET_ID: ${{ secrets.VITE_LOGROCKET_ID }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_ENABLE_MSW: 'false'
      VITE_FEATURE_NEW_UI: ${{ vars.VITE_FEATURE_NEW_UI || 'false' }}
      VITE_SENTRY_RELEASE: ${{ github.sha }}
      SENTRY_UPLOAD: 'true'
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve app version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VITE_APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VITE_APP_VERSION=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate Sentry credentials
        run: |
          test -n "$SENTRY_AUTH_TOKEN" || (echo "Missing SENTRY_AUTH_TOKEN" && exit 1)
          test -n "$SENTRY_ORG" || (echo "Missing SENTRY_ORG" && exit 1)
          test -n "$SENTRY_PROJECT" || (echo "Missing SENTRY_PROJECT" && exit 1)

      - name: Build + upload sourcemaps to Sentry
        run: npm run build:gh
