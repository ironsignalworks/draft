    <body>
      <div id="root"></div>
      <script>
        (function restoreSpaRoute() {
          var url = new URL(window.location.href);
          var encodedPath = url.searchParams.get('p');
          if (!encodedPath) return;
          var basePath = '/draft';
          var decodedPath = decodeURIComponent(encodedPath);
          var normalizedPath = decodedPath.startsWith('/') ? decodedPath : '/' + decodedPath;
          url.searchParams.delete('p');
          var query = url.searchParams.toString();
          var nextUrl = basePath + normalizedPath + (query ? '?' + query : '') + url.hash;
          window.history.replaceState(null, '', nextUrl);
        })();
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
